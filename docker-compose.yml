services:
  backend:
    build:
      context: ./backend
    container_name: nav-site-backend
    environment:
      SECRET_KEY: replace-this-with-a-long-random-string
      TOKEN_EXPIRE_MINUTES: 120
      DATABASE_URL: sqlite:///./data/nav_site.db
      CORS_ORIGINS: http://localhost:50100,http://127.0.0.1:50100
      DEFAULT_ADMIN_USERNAME: admin
      DEFAULT_ADMIN_PASSWORD: ChangeMe123!
    volumes:
      - nav_site_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    container_name: nav-site-frontend
    ports:
      - "50100:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  nav_site_data:
